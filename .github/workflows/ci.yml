name: CI Java

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  compilar-y-probar:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener codigo
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compilar y ejecutar pruebas JUnit
        run: mvn -B test
